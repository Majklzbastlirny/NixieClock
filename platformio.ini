; NixieClock — ESP-IDF firmware (PlatformIO)
; Replaces the old ESPHome config (nixieclock.yaml).
;
; Board: ESP32 WROOM-32 dev module on the UCB32 controller board.
; See components/common/include/pins.h for the full pin map and
; the memory notes (nixie-hardware) for the board architecture.

[platformio]
default_envs = esp32dev
; All firmware lives under src/ + components/. The old YAML and PCB
; sources are kept out of the build.

[env:esp32dev]
platform = espressif32@^6.7.0        ; ships ESP-IDF 5.1.x (GPTimer API)
board = esp32dev
framework = espidf

; Dual-OTA partition layout (see partitions.csv). The default esp32dev table is
; a single ~1MB app slot, which the MQTT build already nearly fills; this gives
; two 1.8MB slots + room for OTA later. NVS stays put so settings survive.
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
board_build.flash_size = 4MB

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; Flashing over an FTDI adapter on COM51 whose DTR/RTS are wired to EN/IO0,
; so esptool auto-resets into the bootloader and reboots after (no buttons).
upload_port = COM51
upload_speed = 460800
monitor_port = COM51

build_flags =
    -Wall
    -Wextra
