esphome:
  name: nixieclock
  friendly_name: NixieClock
  on_boot:
    priority: -10
    then:
      # grab RTC time so the clock works offline
      - ds1307.read_time: rtc_time
      # enable clock & colon
      - lambda: |-
          id(clock_on) = true;
      - switch.template.publish:
          id: clock_display_sw
          state: true
      - switch.turn_on: colon_switch
      # keep Wi‑Fi disabled until user asks
      - wifi.disable

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: NONE          # cut the driver spam

api:
  encryption:
    key: !secret nixieclock_api_key
  on_client_connected:
    then:
      - logger.log: "API client connected – syncing DS1307 from Home Assistant"
      - ds1307.write_time:
          id: rtc_time
      - logger.log: "DS1307 RTC updated successfully"

ota:
  - platform: esphome
    password: !secret nixieclock_ota_password

wifi:
  enable_on_boot: false
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2


status_led:
  pin: GPIO04

# ---------------- TIME SOURCES ----------------
time:
  - platform: ds1307          # hardware RTC
    id: rtc_time
    address: 0x68
    update_interval: never    # we read manually at boot
  - platform: homeassistant   # for occasional re‑sync
    id: ha_time

globals:
  - id: dwell_ticks
    type: uint8_t
    initial_value: '59'      # 1 interval tick = 1 ms  
  - id: nixie_digits
    type: uint8_t[6]
    initial_value: '{10,10,10,10,10,10}'   # 10 = blank
  - id: btn_states
    type: bool[6]
    initial_value: '{false,false,false,false,false,false}'
  - id: hv_dots
    type: bool[6]
    initial_value: '{false,false,false,false,false,false}'
  - id: clock_on
    type: bool
    initial_value: 'true'
  - id: burn_active
    type: bool
    initial_value: 'false'

# === Outputs ===
output:
  # Anodes (74HC42)
  - platform: gpio
    id: an_b0
    pin: GPIO16
  - platform: gpio
    id: an_b1
    pin: GPIO17
  - platform: gpio
    id: an_b2
    pin: GPIO18

  # Cathodes (74141 BCD)
  - platform: gpio
    id: cat_b0
    pin: GPIO23
  - platform: gpio
    id: cat_b1
    pin: GPIO25
  - platform: gpio
    id: cat_b2
    pin: GPIO26
  - platform: gpio
    id: cat_b3
    pin: GPIO27

  # HV dot line (multiplexed)
  - platform: gpio
    id: hv_dot_line
    pin: GPIO32

  # RTTTL speaker
  - platform: ledc
    id: rtttl_out
    pin: GPIO19

# RTTTL player
rtttl:
  id: rtttl_player
  output: rtttl_out

# === Inputs ===
# ---------------- INPUTS ----------------
binary_sensor:
  - platform: gpio          # raw multiplexed
    id: btn_in_raw
    internal: true
    pin:
      number: GPIO14
      mode:
        input: true
        pullup: true

  # back buttons 1‑5 (templates)
  - platform: template
    id: back_btn_1
    name: "Back Button 1"
    lambda: 'return id(btn_states)[1];'
  - platform: template
    id: back_btn_2
    name: "Back Button 2"
    lambda: 'return id(btn_states)[2];'
  - platform: template
    id: back_btn_3
    name: "Back Button 3"
    lambda: 'return id(btn_states)[3];'
  - platform: template
    id: back_btn_4
    name: "Back Button 4"
    lambda: 'return id(btn_states)[4];'

  # Back Button 5 turns Wi‑Fi on for this session
  - platform: template
    id: back_btn_5
    name: "Back Button 5"
    lambda: 'return id(btn_states)[5];'
    on_press:
      - logger.log: "Back Button 5 pressed – enabling Wi‑Fi"
      - wifi.enable

  # Snooze (GPIO15)
  - platform: gpio
    id: snooze_btn
    name: "Snooze Button"
    pin:
      number: GPIO15
      mode:
        input: true
        pullup: true
      inverted: true

# === Sensors ===
sensor:
  - platform: adc
    id: batt_raw
    name: "Battery Voltage"
    pin: GPIO34
    attenuation: 12db
    update_interval: 30s
    samples: 10
    accuracy_decimals: 2
    filters:
      - multiply: 2.0   # 22k/22k divider

# === Switches ===
switch:
  # Pair dots
  - platform: gpio
    id: colon_switch
    name: "Colon Dots"
    pin: GPIO33

  # Clock enable
  - platform: template
    id: clock_display_sw
    name: "Clock Display Enable"
    lambda: 'return id(clock_on);'
    turn_on_action:
      - lambda: 'id(clock_on) = true;'
    turn_off_action:
      - lambda: |-
          id(clock_on) = false;
          id(colon_switch).turn_off();

  # HV dot per tube
  - platform: template
    name: "HV Dot 1"
    lambda: 'return id(hv_dots)[0];'
    turn_on_action:
      - lambda: 'id(hv_dots)[0] = true;'
    turn_off_action:
      - lambda: 'id(hv_dots)[0] = false;'

  - platform: template
    name: "HV Dot 2"
    lambda: 'return id(hv_dots)[1];'
    turn_on_action:
      - lambda: 'id(hv_dots)[1] = true;'
    turn_off_action:
      - lambda: 'id(hv_dots)[1] = false;'

  - platform: template
    name: "HV Dot 3"
    lambda: 'return id(hv_dots)[2];'
    turn_on_action:
      - lambda: 'id(hv_dots)[2] = true;'
    turn_off_action:
      - lambda: 'id(hv_dots)[2] = false;'

  - platform: template
    name: "HV Dot 4"
    lambda: 'return id(hv_dots)[3];'
    turn_on_action:
      - lambda: 'id(hv_dots)[3] = true;'
    turn_off_action:
      - lambda: 'id(hv_dots)[3] = false;'

  - platform: template
    name: "HV Dot 5"
    lambda: 'return id(hv_dots)[4];'
    turn_on_action:
      - lambda: 'id(hv_dots)[4] = true;'
    turn_off_action:
      - lambda: 'id(hv_dots)[4] = false;'

  - platform: template
    name: "HV Dot 6"
    lambda: 'return id(hv_dots)[5];'
    turn_on_action:
      - lambda: 'id(hv_dots)[5] = true;'
    turn_off_action:
      - lambda: 'id(hv_dots)[5] = false;'

# === Fast scan (1 ms per tube)
interval:
  - interval: 1ms
    then:
      - lambda: |-
          static const uint8_t BLANK = 10;
          static uint8_t tube = 0;        // which tube is lit
          static uint8_t hold = 0;        // how long we've held it

          uint8_t dwell = id(dwell_ticks);  // 1‑20 ms from HA
          for (int i = 0; i < dwell; i++){
            delayMicroseconds(500);
          // --- refresh hardware only when we switch tube ---
          //if (hold == 0) {
            uint8_t val  = id(nixie_digits)[tube];
            uint8_t addr = (val == BLANK) ? 7 : tube;   // 7 ⇒ no anode


            // cathodes
            if (val < 10) {
              id(cat_b0).set_state(val & 0x01);
              id(cat_b1).set_state(val & 0x02);
              id(cat_b2).set_state(val & 0x04);
              id(cat_b3).set_state(val & 0x08);
            } else {
              id(cat_b0).turn_off();
              id(cat_b1).turn_off();
              id(cat_b2).turn_off();
              id(cat_b3).turn_off();
            }
            // anode select (3‑bit)
            id(an_b0).set_state(addr & 0x01);
            id(an_b1).set_state(addr & 0x02);
            id(an_b2).set_state(addr & 0x04);

            // HV dot
            id(hv_dot_line).set_state(id(hv_dots)[tube]);

            // read button once per dwell
            id(btn_states)[tube] = !id(btn_in_raw).state;
          //}

          // --- dwell counter ---
          hold++;
          if (hold >= 1) {
            hold = 0;
            tube = (tube + 1) % 6;
          }
          
          }

  # 1s tick: colon blink, time update, start burn-in
  - interval: 1s
    then:
      - lambda: |-
          static bool colon_state = false;

          if (!id(clock_on)) {
            id(burn_active) = false;
            return;
          }

          auto now = id(rtc_time).now();   // <-- use RTC!
          if (!now.is_valid()) return;

          uint8_t h = now.hour;
          uint8_t m = now.minute;
          uint8_t s = now.second;

          if (s == 55 && !id(burn_active)) {
            id(burn_active) = true;
            id(burn_in).execute();
            return;
          }

          if (!id(burn_active)) {
            colon_state = !colon_state;
            if (colon_state) id(colon_switch).turn_on();
            else             id(colon_switch).turn_off();
          }

          if (id(burn_active)) return;

          id(nixie_digits)[0] = s % 10;
          id(nixie_digits)[1] = s / 10;
          id(nixie_digits)[2] = m % 10;
          id(nixie_digits)[3] = m / 10;
          id(nixie_digits)[4] = h % 10;
          id(nixie_digits)[5] = h / 10;


# === Manual digit setters (leftmost first, -1 blanks)
number:
  - platform: template
    name: "Tube Dwell (ms)"
    id: dwell_slider
    min_value: 1
    max_value: 2000        # try up to 20 ms per tube
    step: 1
    restore_value: yes
    set_action:
      - lambda: |
          id(dwell_ticks) = (uint8_t)x;    // store new dwell length

  - platform: template
    name: "Tube 1 Digit"
    min_value: -1
    max_value: 9
    step: 1
    set_action:
      - lambda: |
          int v = (int)x;
          id(nixie_digits)[5] = (v < 0) ? 10 : (uint8_t)v;

  - platform: template
    name: "Tube 2 Digit"
    min_value: -1
    max_value: 9
    step: 1
    set_action:
      - lambda: |
          int v = (int)x;
          id(nixie_digits)[4] = (v < 0) ? 10 : (uint8_t)v;

  - platform: template
    name: "Tube 3 Digit"
    min_value: -1
    max_value: 9
    step: 1
    set_action:
      - lambda: |
          int v = (int)x;
          id(nixie_digits)[3] = (v < 0) ? 10 : (uint8_t)v;

  - platform: template
    name: "Tube 4 Digit"
    min_value: -1
    max_value: 9
    step: 1
    set_action:
      - lambda: |
          int v = (int)x;
          id(nixie_digits)[2] = (v < 0) ? 10 : (uint8_t)v;

  - platform: template
    name: "Tube 5 Digit"
    min_value: -1
    max_value: 9
    step: 1
    set_action:
      - lambda: |
          int v = (int)x;
          id(nixie_digits)[1] = (v < 0) ? 10 : (uint8_t)v;

  - platform: template
    name: "Tube 6 Digit"
    min_value: -1
    max_value: 9
    step: 1
    set_action:
      - lambda: |
          int v = (int)x;
          id(nixie_digits)[0] = (v < 0) ? 10 : (uint8_t)v;

# === Buttons ===
button:
  - platform: restart
    name: "Reboot ESP"

  - platform: template
    name: "Nixie Sweep Test"
    on_press:
      - script.execute: sweep_test

  - platform: template
    name: "RTTL Star Wars Test"
    on_press:
      - rtttl.play:
          id: rtttl_player
          rtttl: "star_wars:d=16,o=5,b=100:4e,4e,4e,8c,p,g,4e,8c,p,g,4e,4p,4b,4b,4b,8c6,p,g,4d#,8c,p,g,4e,8p"

script:
  # Manual fast sweep (no delays)
  - id: sweep_test
    mode: queued
    then:
      - repeat:
          count: 10
          then:
            - lambda: |-
                static uint8_t d = 0;
                for (int i = 0; i < 6; i++) id(nixie_digits)[i] = d;
                d = (d + 1) % 10;

  # Burn-in pattern: 5 seconds (50 * 100ms), cycling 0..9
  - id: burn_in
    mode: restart
    then:
      - lambda: |-
          id(colon_switch).turn_off();
      - repeat:
          count: 50
          then:
            - lambda: |-
                static uint8_t idx = 0;
                uint8_t d = idx % 10;
                for (int i = 0; i < 6; i++) id(nixie_digits)[i] = d;
                idx++;
            - delay: 100ms
      - lambda: 'id(burn_active) = false;'

# === Buses ===
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_main

one_wire:
  - platform: gpio
    pin: GPIO13
    id: onewire_bus